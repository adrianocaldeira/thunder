name: release

# Publica os pacotes no NuGet.org via Trusted Publishing (OIDC), sem API key de longa duração.
# Dispara ao empurrar uma tag "v*" ou manualmente pela aba Actions.
# Requer uma política de Trusted Publishing no NuGet.org (owner: acaldeira, repo:
# adrianocaldeira/thunder, workflow: release.yml).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write   # necessário para o GitHub emitir o token OIDC
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaura pacotes
        run: dotnet restore Thunder.sln

      - name: Compila (Release)
        run: dotnet build Thunder.sln -c Release --no-restore

      - name: Testa (Release)
        run: dotnet test Thunder.sln -c Release --no-build

      - name: Empacota (Release)
        run: dotnet pack Thunder.sln -c Release --no-build -o artifacts

      - name: Login no NuGet (OIDC troca por chave temporária)
        uses: NuGet/login@v1
        id: login
        with:
          user: acaldeira

      - name: Publica no NuGet.org
        run: |
          # 'dotnet nuget push' de um .nupkg envia o .snupkg par (mesma pasta) automaticamente.
          $pacotes = Get-ChildItem artifacts/*.nupkg
          if (-not $pacotes) { throw "Nenhum pacote .nupkg encontrado em artifacts/." }
          foreach ($pacote in $pacotes) {
            dotnet nuget push $pacote.FullName --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
