name: release

# Publica os pacotes no NuGet.org via Trusted Publishing (OIDC), sem API key de longa duração.
# Dispara ao empurrar uma tag "v*" ou manualmente pela aba Actions.
# Requer uma política de Trusted Publishing no NuGet.org (owner: acaldeira, repo:
# adrianocaldeira/thunder, workflow: release.yml).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write   # necessário para o GitHub emitir o token OIDC
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura NuGet
        uses: NuGet/setup-nuget@v2

      - name: Configura MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restaura pacotes
        run: nuget restore Thunder.sln

      - name: Compila (Release)
        run: msbuild Thunder.sln /p:Configuration=Release /m /nologo

      - name: Confere versão dos nuspec contra os assemblies
        shell: pwsh
        run: |
          $map = @{
            'Thunder'                 = 'src/main/Thunder/bin/Release/Thunder.dll'
            'Thunder.NHibernate'      = 'src/main/Thunder.NHibernate/bin/Release/Thunder.NHibernate.dll'
            'Thunder.Web.Mvc'         = 'src/main/Thunder.Web.Mvc/bin/Release/Thunder.Web.Mvc.dll'
            'Thunder.EntityFramework' = 'src/main/Thunder.EntityFramework/bin/Release/Thunder.EntityFramework.dll'
          }
          foreach ($id in $map.Keys) {
            [xml]$nuspec = Get-Content "build/nuspec/$id.nuspec"
            $nuspecVersion = $nuspec.package.metadata.version
            $asmVersion = [Reflection.AssemblyName]::GetAssemblyName((Resolve-Path $map[$id])).Version.ToString(3)
            if ($nuspecVersion -ne $asmVersion) {
              throw "Versao divergente em ${id}: nuspec=$nuspecVersion assembly=$asmVersion"
            }
            Write-Host "$id OK ($nuspecVersion)"
          }

      - name: Empacota
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Get-ChildItem build/nuspec/*.nuspec | ForEach-Object {
            nuget pack $_.FullName -BasePath . -OutputDirectory artifacts -Properties Configuration=Release
            if ($LASTEXITCODE -ne 0) { throw "Falha ao empacotar $($_.Name)" }
          }

      - name: Login no NuGet (OIDC troca por chave temporária)
        uses: NuGet/login@v1
        id: login
        with:
          user: acaldeira

      - name: Publica no NuGet.org
        shell: pwsh
        run: |
          Get-ChildItem artifacts/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
            if ($LASTEXITCODE -ne 0) { throw "Falha ao publicar $($_.Name)" }
          }
